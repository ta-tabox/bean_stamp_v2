services:
  db:
    image: postgres:16
    container_name: bean_stamp_db
    environment:
      POSTGRES_DB: bean_stamp
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bean_stamp"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bean_stamp_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace_me
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bean_stamp
      GOOGLE_CLOUD_PROJECT: replace_me
      GCS_BUCKET_UPLOADS: replace_me
      npm_config_store_dir: /pnpm/store
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - pnpm_store:/pnpm

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: bean_stamp_e2e
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: replace_me
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bean_stamp_e2e
      GOOGLE_CLOUD_PROJECT: replace_me
      GCS_BUCKET_UPLOADS: replace_me
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      E2E_DATABASE_NAME: bean_stamp_e2e
      E2E_DB_ADMIN_URL: postgresql://postgres:postgres@db:5432/postgres
      npm_config_store_dir: /pnpm/store
      WATCHPACK_POLLING: "true"
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      - e2e_node_modules:/app/node_modules
      - e2e_next:/app/.next
      - pnpm_store:/pnpm

volumes:
  postgres_data:
  app_node_modules:
  pnpm_store:
    name: global_pnpm_store
  e2e_node_modules:
  e2e_next:
